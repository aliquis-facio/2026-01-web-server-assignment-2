<!--
Bootstrap Card 스타일로 질문 목록 표시
-->
{% extends 'qa/base.html' %}
{% block content %}
<h2>All Questions</h2>

<div class="d-flex justify-content-end mb-3">
    <a href="{% url 'ask_question' %}" class="btn btn-primary">Ask Question</a>
</div>

<!-- 반응형 2열 카드 레이아웃 -->
<div class="row row-cols-1 row-cols-md-2 g-4">

    <!-- questions를 반복해 카드 생성 -->
    {% for question in questions %}
    <div class="col">
        <div class="card h-100">
            <div class="card-body">
                <h5 class="card-title">
                    <!-- 질문 상세 페이지로의 링크 -->
                    <a href="{% url 'question_detail' question.pk %}">{{ question.title }}</a>
                </h5>
                <!-- 질문 내용 한 줄로 표시 (text-truncate 클래스 사용) -->
                <p class="card-text text-truncate">{{ question.content }}</p>
            </div>
            <div class="card-footer text-muted">
                <!-- 작성자와 작성일을 표시 -->
                By {{ question.author.username }} | {{ question.created_at | date:"Y-m-d H:i" }}
            </div>
        </div>
    </div>

    {% empty %}
    <!-- 질문이 없을 시 안내 문구 표시 -->
    <div class="col-12">
        <p>No questions yet.</p>
    </div>
    {% endfor %}

</div>
{% endblock %}
