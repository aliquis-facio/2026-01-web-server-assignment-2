<!-- 공통 레이아웃 -->
<!-- 정적 파일 로드 -->
{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>QnA Site</title>
    <!-- Bootstrap 5 CSS CDN 추가 -->
    <link href="{% static 'css/bootstrap.min.css' %}" rel="stylesheet">
</head>
<body>
    <!-- Bootstrap 5 JS CDN 추가 -->
    <script src="{% static 'js/bootstrap.min.js' %}"></script>
    <nav class="navbar navbar-expand-lg navbar-light bg-light px-4">
        <a class="navbar-brand" href="/">QnA</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav ms-auto">

                <!-- 로그인 상태 분기 -->
                {% if user.is_authenticated %}
                <li class="nav-item">
                    <span class="nav-link">👤 {{ user.username }}</span>
                </li>
                <li class="nav-item">
                    <!-- 질문 작성 페이지 링크 -->
                    <a class="nav-link" href="{% url 'ask_question' %}">Ask Question</a>
                </li>
                <li class="nav-item">
                    <!--
                    로그아웃 (POST 방식)
                    주의: <a> 태그로 하면 405 에러 발생!
                    필수: method="post", csrf_token 포함
                    -->
                    <form action="{% url 'logout' %}" method="POST" class="d-inline">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-link nav-link"
                                style="display:inline; padding: 0;">Logout</button>
                    </form>
                </li>

                {% else %}
                <li class="nav-item">
                    <!-- 로그인 페이지 링크 -->
                    <a class="nav-link" href="{% url 'login' %}">Login</a>
                </li>
                {% endif %}

            </ul>
        </div>
    </nav>

    <div class="container mt-4">
        {% block content %}
        {% endblock %}
    </div>
</body>
</html>
